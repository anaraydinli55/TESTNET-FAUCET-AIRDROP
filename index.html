<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTNET-FAUCET-AIRDROP</title>
    
    <!-- Firebase SDK (Compat version for easy single-file usage) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding-top: 80px;
            padding-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Sabit Üst Menyu */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #111;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 1000;
            border-bottom: 2px solid #222;
        }

        .nav-btn {
            background-color: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* Axtarış Bölməsi */
        .search-container {
            width: 90%;
            max-width: 500px;
            margin: 15px 0;
        }

        #search-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #111;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Məzmun Container */
        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .page-title {
            color: #87CEFA; /* Açıq Mavi */
            font-weight: bold;
            font-size: 26px;
            margin-bottom: 20px;
            cursor: pointer;
            user-select: none;
            text-transform: uppercase;
        }

        /* Siyahı Elementləri */
        .item-card {
            background: #0a0a0a;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #87CEFA;
            text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .item-name {
            color: #87CEFA;
            font-weight: bold;
            font-size: 18px;
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .item-url {
            color: white;
            font-weight: bold;
            text-decoration: none;
            word-break: break-all;
            font-size: 14px;
        }

        .item-url:hover {
            color: #87CEFA;
        }

        /* Admin Paneli Modalı */
        #admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #111;
            padding: 20px;
            border: 2px solid #87CEFA;
            border-radius: 12px;
            z-index: 2000;
            width: 340px;
            max-height: 85vh;
            overflow-y: auto;
        }

        #admin-panel input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .admin-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }

        .del-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background-color: #87CEFA;
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        /* Giriş Düymələri (Home) */
        .home-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
        }

        .big-btn {
            padding: 25px;
            font-size: 20px;
            background-color: #111;
            color: #87CEFA;
            border: 2px solid #87CEFA;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .big-btn:hover {
            background: #87CEFA;
            color: black;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            background-color: #000;
            padding: 15px 0;
            font-size: 13px;
            color: #555;
            border-top: 1px solid #222;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header id="main-nav" class="hidden">
        <button class="nav-btn" onclick="showPage('home')">ANA SƏHİFƏ</button>
        <button class="nav-btn" id="btn-opt1" onclick="showPage('testnets')">TESTNETLƏR</button>
        <button class="nav-btn" id="btn-opt2" onclick="showPage('faucets')">FAUCETLƏR</button>
        <button class="nav-btn" id="btn-opt3" onclick="showPage('airdrops')">AİRDROPLAR</button>
        <button class="nav-btn" id="btn-opt4" onclick="showPage('ai')">Aİ</button>
    </header>

    <!-- ANA SƏHİFƏ -->
    <div class="container" id="home-page">
        <h1 style="color: #87CEFA;">TESTNET-FAUCET-AIRDROP</h1>
        <div class="home-buttons">
            <button class="big-btn" onclick="showPage('testnets')">TESTNETLƏR</button>
            <button class="big-btn" onclick="showPage('faucets')">FAUCETLƏR</button>
            <button class="big-btn" onclick="showPage('airdrops')">AİRDROPLAR</button>
            <button class="big-btn" onclick="showPage('airdrops')">Aİ</button>
        </div>
    </div>

    <!-- MƏZMUN SƏHİFƏSİ -->
    <div class="container hidden" id="content-page">
        <div id="page-title-text" class="page-title" onclick="handleTitleClick()">BAŞLIQ</div>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Axtar (min. 3 hərf)..." onkeyup="filterList()">
        </div>

        <div id="list-display"></div>
    </div>

    <!-- ADMIN PANEL (GİZLİ) -->
    <div id="admin-panel">
        <h3 style="color: #87CEFA; margin-top:0;">Məlumat İdarəetmə</h3>
        <input type="text" id="input-name" placeholder="Layihə adı">
        <input type="text" id="input-url" placeholder="URL (https://...)">
        <button class="save-btn" onclick="saveData()">ƏLAVƏ ET</button>
        
        <h4 style="border-bottom: 1px solid #444; padding-bottom: 5px; margin-top: 20px;">Mövcud Linklər</h4>
        <div id="admin-list-manage"></div>
        
        <button onclick="closeAdmin()" style="width:100%; background: #444; color: white; border:none; padding:10px; margin-top: 15px; cursor:pointer; border-radius:5px;">BAĞLA</button>
    </div>

    <footer>
        this page designed by Anar Aydinli
    </footer>

    <script>
        // Sizin Firebase Məlumatlarınız
        const firebaseConfig = {
            apiKey: "AIzaSyBBO7x1tt_heFyUoXM3tnbctqh6iUIF-ms",
            authDomain: "testnet-faucet-airdrop.firebaseapp.com",
            databaseURL: "https://testnet-faucet-airdrop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "testnet-faucet-airdrop",
            storageBucket: "testnet-faucet-airdrop.firebasestorage.app",
            messagingSenderId: "944808736025",
            appId: "1:944808736025:web:55404dfa444e818e774188",
            measurementId: "G-4KHF5T70S1"
        };

        // Firebase-i Başlat
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentPage = 'home';
        let clickCount = 0;
        let lastClickTime = 0;
        let allData = []; // Axtarış üçün qlobal baza

        // Səhifə dəyişmə funksiyası
        function showPage(pageId) {
            currentPage = pageId;
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('content-page').classList.add('hidden');
            document.getElementById('main-nav').classList.remove('hidden');

            if (pageId === 'home') {
                document.getElementById('home-page').classList.remove('hidden');
                document.getElementById('main-nav').classList.add('hidden');
            } else {
                document.getElementById('content-page').classList.remove('hidden');
                const titleMap = {
                    'testnets': 'TESTNETLƏR',
                    'faucets': 'FAUCETLƏR',
                    'airdrops': 'AİRDROPLAR',
                    'ai': 'Aİ'
                };
                document.getElementById('page-title-text').innerText = titleMap[pageId];
                document.getElementById('search-input').value = '';
                updateNavButtons(pageId);
                listenToData();
            }
        }

        // Üst menyu düymələrini tənzimlə
        function updateNavButtons(activePage) {
            const b1 = document.getElementById('btn-opt1');
            const b2 = document.getElementById('btn-opt2');
            const b3 = document.getElementById('btn-opt3');
            b1.classList.remove('hidden'); b2.classList.remove('hidden'); b3.classList.remove('hidden');

            if (activePage === 'testnets') b1.classList.add('hidden');
            if (activePage === 'faucets') b2.classList.add('hidden');
            if (activePage === 'airdrops') b3.classList.add('hidden');
        }

        // Admin Paneli üçün Gizli Klik (5 saniyədə 5 klik)
        function handleTitleClick() {
            const now = Date.now();
            if (now - lastClickTime > 5000) clickCount = 1;
            else clickCount++;
            lastClickTime = now;

            if (clickCount === 5) {
                const pass = prompt("Admin Kodunu Daxil Edin:");
                if (pass === "2026") {
                    document.getElementById('admin-panel').style.display = 'block';
                    renderAdminList();
                } else {
                    alert("Kod Səhvdir!");
                }
                clickCount = 0;
            }
        }

        function closeAdmin() { 
            document.getElementById('admin-panel').style.display = 'none'; 
        }

        // Firebase-dən məlumatları canlı dinlə (Realtime)
        function listenToData() {
            db.ref(currentPage).on('value', (snapshot) => {
                const data = snapshot.val();
                allData = [];
                if (data) {
                    for (let id in data) {
                        allData.push({ id, ...data[id] });
                    }
                }
                renderList(allData);
                if(document.getElementById('admin-panel').style.display === 'block') {
                    renderAdminList();
                }
            });
        }

        // Siyahını Ekrana Çıxar
        function renderList(items) {
            const listDiv = document.getElementById('list-display');
            listDiv.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <span class="item-name">${item.name}</span>
                    <a href="${item.url}" target="_blank" class="item-url">${item.url}</a>
                `;
                listDiv.appendChild(div);
            });
        }

        // Axtarış Funksiyası (min 3 hərf)
        function filterList() {
            const term = document.getElementById('search-input').value.toLowerCase();
            if (term.length >= 3) {
                const filtered = allData.filter(i => 
                    i.name.toLowerCase().includes(term) || 
                    i.url.toLowerCase().includes(term)
                );
                renderList(filtered);
            } else {
                renderList(allData);
            }
        }

        // Admin Listini göstər (Silmək düyməsi ilə)
        function renderAdminList() {
            const adminListDiv = document.getElementById('admin-list-manage');
            adminListDiv.innerHTML = '';
            allData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'admin-item-row';
                div.innerHTML = `
                    <span style="font-size:12px; color:#87CEFA">${item.name}</span>
                    <button class="del-btn" onclick="deleteItem('${item.id}')">SİL</button>
                `;
                adminListDiv.appendChild(div);
            });
        }

        // Verilənlər bazasına əlavə et
        function saveData() {
            const name = document.getElementById('input-name').value;
            const url = document.getElementById('input-url').value;
            if (!name || !url) return alert("Ad və URL boş ola bilməz!");

            db.ref(currentPage).push({ name, url }).then(() => {
                document.getElementById('input-name').value = '';
                document.getElementById('input-url').value = '';
            });
        }

        // Verilənlər bazasından sil
        function deleteItem(id) {
            if (confirm("Bu linki silmək istəyirsiniz?")) {
                db.ref(currentPage).child(id).remove();
            }
        }
    </script>
</body>
</html>
